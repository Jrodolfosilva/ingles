<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trilha da Fluência — Planner 360 dias</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;460;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* base palette */
    --black:    #0E0E0E;
    --white:    #FAFAFA;
    --gray-mid: #737373;
    --green:    #67A500;
    --gray-lt:  #e0e0e0;
    --card-bg:  #ffffff;

    /* score colors */
    --score-red:    #e74c3c;
    --score-orange: #e67e22;
    --score-yellow: #f1c40f;
    --score-green:  #67A500;

    /* alert */
    --alert-bg:  #FDE8E8;
    --alert-red: #c0392b;

    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-pill: 20px;
    --maxw:480px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--white);
    color:var(--black);
    font-family:'Inter', -apple-system, sans-serif;
    font-size:14px;
    min-height:100vh;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--green);}
  ::selection{background:var(--green); color:#fff;}

  .wrap{max-width:var(--maxw); margin:0 auto; padding:20px 14px 150px;}

  /* ---------- HERO ---------- */
  .hero{
    display:flex; align-items:center; gap:24px; flex-wrap:wrap;
    padding:20px 4px 24px; border-bottom:1.5px solid var(--gray-lt);
    margin-bottom:20px;
  }
  .hero-text{flex:1; min-width:260px;}
  .eyebrow{
    letter-spacing:.06em; text-transform:uppercase;
    font-size:12px; font-weight:500; color:var(--green); margin:0 0 8px;
  }
  h1.title{
    font-weight:600; font-size:clamp(26px,5vw,36px);
    margin:0 0 8px; letter-spacing:-0.2px; line-height:1.1;
  }
  .title em{font-style:normal; color:var(--green); font-weight:600;}
  .subtitle{color:var(--gray-mid); max-width:480px; font-size:14px; font-weight:300; margin:0;}

  .ring-box{display:flex; align-items:center; gap:14px;}
  .ring{
    width:104px; height:104px; border-radius:50%;
    background: conic-gradient(var(--score-color, var(--green)) calc(var(--pct,0)*1%), var(--gray-lt) 0);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    transition: background 0.4s ease;
  }
  .ring-inner{
    width:82px; height:82px; border-radius:50%; background:var(--card-bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .ring-inner .num{font-size:22px; font-weight:600; letter-spacing:-0.2px;}
  .ring-inner .lbl{font-size:9.5px; color:var(--gray-mid); text-transform:uppercase; letter-spacing:.06em;}
  .ring-stats{font-size:12.5px; color:var(--gray-mid); font-weight:300;}
  .ring-stats div{margin-bottom:2px;}
  .ring-stats b{color:var(--black); font-weight:600;}

  /* ---------- CONTROLS ---------- */
  .controls{
    display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:18px;
  }
  .btn{
    background:#fff; border:1.5px solid var(--gray-lt); color:var(--black);
    padding:10px 16px; border-radius:var(--radius-md); font-size:13px; cursor:pointer;
    font-family:'Inter'; font-weight:500; transition:.15s border-color, .15s background, .1s transform;
    white-space:nowrap;
  }
  .btn:hover{border-color:var(--gray-mid); background:#f2f2f2;}
  .btn:active{transform:translateY(0);}
  .btn.dark{background:var(--black); color:var(--white); border-color:var(--black); font-weight:500;}
  .btn.dark:hover{opacity:.88; background:var(--black); transform:translateY(-1px);}
  .btn.dark:active{opacity:1; transform:translateY(0);}
  .btn.green{background:var(--green); color:#fff; border-color:var(--green); font-weight:500;}
  .btn.green:hover{opacity:.88;}
  .btn.ghost{background:transparent;}
  .btn.danger{color:var(--alert-red); border-color:var(--gray-lt);}
  .btn.danger:hover{border-color:var(--alert-red); background:var(--alert-bg);}
  .btn:disabled{opacity:.6; cursor:not-allowed; background:var(--gray-mid); color:#fff; border-color:var(--gray-mid);}

  /* ---------- TRAIL NAV (chip style) ---------- */
  .trail-nav{
    position:relative; margin: 4px 0 26px;
    padding: 4px 2px;
    overflow-x:auto;
  }
  .trail-nodes{display:flex; gap:8px; position:relative; z-index:1; min-width:max-content;}
  .trail-node{
    display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer;
    padding:10px 12px; border:1.5px solid var(--gray-lt); border-radius:var(--radius-md);
    background:#fff; transition:.15s border-color, .15s background, .1s transform;
    min-width:64px;
  }
  .trail-node:hover{border-color:var(--gray-mid); background:#f2f2f2; transform:translateY(-1px);}
  .trail-node.complete{border-color:var(--green); background:#f3f9ea;}
  .trail-dot{
    width:26px; height:26px; border-radius:50%; flex-shrink:0;
    background: conic-gradient(var(--score-color,var(--green)) calc(var(--p,0)*1%), var(--gray-lt) 0);
    display:flex; align-items:center; justify-content:center;
  }
  .trail-dot::after{
    content:''; width:18px; height:18px; border-radius:50%; background:#fff;
  }
  .trail-label{font-size:10.5px; color:var(--gray-mid); text-align:center; font-weight:400;}
  .trail-label b{display:block; color:var(--black); font-size:11px; font-weight:600;}

  /* ---------- STAGE SECTION ---------- */
  .stage{
    border:1.5px solid var(--gray-lt); border-radius:var(--radius-lg); margin-bottom:14px;
    background:var(--card-bg);
    overflow:hidden; scroll-margin-top: 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .stage > summary{
    list-style:none; cursor:pointer; padding:16px 18px; display:flex; align-items:center; gap:14px;
  }
  .stage > summary::-webkit-details-marker{display:none;}
  .stage-num{
    font-size:13px; font-weight:600; color:#fff; width:28px; height:28px; flex-shrink:0;
    background:var(--black); border-radius:50%; display:flex; align-items:center; justify-content:center;
  }
  .stage-info{flex:1; min-width:0;}
  .stage-name{font-weight:600; font-size:14.5px; letter-spacing:-0.1px;}
  .stage-range{font-size:12px; color:var(--gray-mid); font-weight:300;}
  .stage-bar-wrap{width:100px; flex-shrink:0;}
  .stage-bar{height:6px; border-radius:4px; background:var(--gray-lt); overflow:hidden;}
  .stage-bar > i{display:block; height:100%; background:var(--green); border-radius:4px; transition:.3s width, .3s background;}
  .stage-pct{font-size:11px; color:var(--gray-mid); font-weight:500; text-align:right; margin-top:4px;}
  .chev{transition:.2s transform; color:var(--gray-mid); flex-shrink:0;}
  .stage[open] > summary .chev{transform:rotate(90deg);}

  .stage-body{padding:2px 12px 12px;}

  /* ---------- DAY CARD ---------- */
  .day{
    background:#fff; border:1.5px solid var(--gray-lt); border-radius:var(--radius-md);
    margin:8px 6px; padding:12px 14px; scroll-margin-top:18px;
    transition:.2s border-color, .2s background, .25s opacity;
  }
  .day.done{
    border-color: var(--gray-lt); background:#f2f2f2; opacity:.5;
  }
  .day.done:hover, .day.done:focus-within{opacity:.85;}
  .day.done .day-num{background:var(--gray-mid);}
  .day.done .task input:checked{background:var(--gray-mid); border-color:var(--gray-mid);}
  .day.flash{animation:flash 1s ease;}
  @keyframes flash{ 0%{box-shadow:0 0 0 3px var(--green);} 100%{box-shadow:0 0 0 0 transparent;} }
  .day-head{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
  .day-num{
    font-weight:600; font-size:12.5px;
    background:var(--black); color:#fff; padding:4px 10px; border-radius:var(--radius-pill);
    flex-shrink:0;
  }
  .day-mini{height:5px; flex:1; background:var(--gray-lt); border-radius:3px; overflow:hidden;}
  .day-mini > i{display:block; height:100%; background:var(--green);}
  .day-toggle-all{
    font-size:11px; color:var(--gray-mid); cursor:pointer; background:none; border:none;
    font-family:'Inter'; font-weight:500; padding:4px 8px; flex-shrink:0; border-radius:var(--radius-sm);
  }
  .day-toggle-all:hover{color:var(--black); background:#f2f2f2;}

  .task{
    display:flex; align-items:flex-start; gap:10px; padding:6px 4px; font-size:13.5px;
    color:var(--black); font-weight:300; cursor:pointer; border-radius:var(--radius-sm);
  }
  .task:hover{background:#f7f7f7;}
  .task input{
    appearance:none; -webkit-appearance:none; width:18px; height:18px; flex-shrink:0; margin-top:1px;
    border:1.5px solid var(--gray-lt); border-radius:6px; cursor:pointer; position:relative;
    background:#fff; transition:.12s border-color, .12s background;
  }
  .task input:hover{border-color:var(--gray-mid);}
  .task input:checked{background:var(--green); border-color:var(--green);}
  .task input:checked::after{
    content:''; position:absolute; left:5.5px; top:1.5px; width:4px; height:9px;
    border:solid #fff; border-width:0 2px 2px 0; transform:rotate(45deg);
  }
  .task span{flex:1;}
  .task.checked span{color:var(--gray-mid); text-decoration:line-through; text-decoration-color:var(--gray-lt);}
  .task a{color:var(--green); text-decoration:underline; text-decoration-color:rgba(103,165,0,.35); font-weight:400;}
  .task a:hover{text-decoration-color:var(--green);}

  /* ---------- FOOTER BAR ---------- */
  .footbar{
    position:fixed; left:0; right:0; bottom:0; z-index:20;
    background:linear-gradient(180deg, transparent, var(--white) 40%);
    padding:18px 16px 16px; display:flex; justify-content:center;
  }
  .footbar-inner{
    max-width:var(--maxw); width:100%; display:flex; align-items:center; gap:14px;
    background:#fff; border:1.5px solid var(--gray-lt); border-radius:var(--radius-lg); padding:12px 18px;
    box-shadow: 0 4px 24px rgba(0,0,0,.10);
  }
  .footbar-bar{flex:1; height:8px; background:var(--gray-lt); border-radius:6px; overflow:hidden;}
  .footbar-bar > i{display:block; height:100%; background:var(--green); border-radius:6px; transition:.4s width;}
  .footbar-txt{font-size:12.5px; color:var(--gray-mid); font-weight:500; white-space:nowrap;}

  .empty-tasks{font-size:12.5px; color:var(--gray-mid); font-weight:300; font-style:italic; padding:4px 4px 8px;}

  /* ---------- LESSON QA BLOCK ---------- */
  .lesson-block{
    margin:10px 4px 2px; border:1.5px solid var(--gray-lt); border-radius:var(--radius-sm);
    background:#fafafa; overflow:hidden;
  }
  .lesson-block > summary{
    list-style:none; cursor:pointer; padding:8px 10px; font-size:12px; font-weight:500;
    color:var(--gray-mid);
  }
  .lesson-block > summary::-webkit-details-marker{display:none;}
  .lesson-block > summary:hover{color:var(--black);}
  .lesson-qa{padding:2px 10px 10px; display:flex; flex-direction:column; gap:8px;}
  .lesson-qa-item{
    display:flex; flex-direction:column; gap:2px; font-size:12.5px; font-weight:300;
    border-left:2px solid var(--green); padding-left:8px;
  }
  .lesson-q{font-weight:500; color:var(--black);}
  .lesson-a{color:var(--gray-mid);}

  .status{
    position:fixed; top:14px; right:14px; font-size:12px; font-weight:500;
    color:var(--black); background:#fff; border:1.5px solid var(--gray-lt); padding:6px 12px;
    border-radius:var(--radius-pill); opacity:0; transition:.3s opacity; z-index:30;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .status.show{opacity:1;}
  .status.err{color:var(--alert-red); background:var(--alert-bg); border-color:#f5c6c6;}

  .loading-screen{
    position:fixed; inset:0; background:var(--white); display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; z-index:50;
  }
  .loading-screen .spin{
    width:32px; height:32px; border-radius:50%; border:3px solid var(--gray-lt); border-top-color:var(--green);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-screen p{color:var(--gray-mid); font-size:13px; font-weight:400;}

  @media (max-width:640px){
    .hero{flex-direction:column; align-items:flex-start;}
    .ring-box{align-self:flex-start;}
    .footbar-txt{display:none;}
  }
</style>

</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spin"></div>
  <p>carregando sua trilha…</p>
</div>

<div class="status" id="statusMsg">salvo ✓</div>

<div class="wrap" id="app" style="display:none;">

  <div class="hero">
    <div class="hero-text">
      <p class="eyebrow">Cronograma dos Fluentes · 360 dias</p>
      <h1 class="title">Trilha da <em>Fluência</em></h1>
      <p class="subtitle">Sua jornada diária de inglês, do dia 1 ao dia 360, organizada em 12 meses. Marque o que você concluiu e acompanhe seu progresso.</p>
    </div>
    <div class="ring-box">
      <div class="ring" id="ringOuter">
        <div class="ring-inner">
          <div class="num" id="ringPct">0%</div>
          <div class="lbl">concluído</div>
        </div>
      </div>
      <div class="ring-stats">
        <div><b id="statDaysDone">0</b>/360 dias</div>
        <div><b id="statItemsDone">0</b>/<span id="statItemsTotal">0</span> tarefas</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn green" id="currentDayBtn" style="flex:1;">Dia atual</button>
  </div>

  <div class="trail-nav" id="trailNav">
    <div class="trail-nodes" id="trailNodes"></div>
  </div>

  <div id="stages"></div>

</div>

<div class="footbar">
  <div class="footbar-inner">
    <div class="footbar-txt" id="footTxt">0% concluído</div>
    <div class="footbar-bar"><i id="footBarFill" style="width:0%"></i></div>
  </div>
</div>

<script>
const DAYS = [{"d": 1, "stage": "Mês 1", "tasks": ["Escreva um texto se apresentando (nome, origem, profissão) e poste na Comunidade.", "Leia seu texto em voz alta e pratique a pronúncia."]}, {"d": 2, "stage": "Mês 1", "tasks": ["Escreva frases sobre seu dia usando Reverso Context ou Collins.", "Mude seus dispositivos e redes sociais para o inglês; anote palavras novas."]}, {"d": 3, "stage": "Mês 1", "tasks": ["Acompanhe um canal gringo no YouTube (lista de canais / módulo iso-imersão).", "Assista ao vídeo sem legendas, depois com legendas, e anote palavras."]}, {"d": 4, "stage": "Mês 1", "tasks": ["Aprenda com uma música no Lyricstraining, nível Beginner.", "Assista a um vídeo do canal escolhido e tente identificar palavras."]}, {"d": 5, "stage": "Mês 1", "tasks": ["Procure vocabulário de objetos de um cômodo da casa usando Collins.", "Cole notas adesivas com os nomes dos objetos."]}, {"d": 6, "stage": "Mês 1", "tasks": ["Converse com o ChatGPT usando prompt de apresentação.", "Peça ao ChatGPT para corrigir a conversa e anote erros."]}, {"d": 7, "stage": "Mês 1", "tasks": ["Escreva um resumo da semana em inglês e poste na Comunidade.", "Assista a um filme/série em inglês com legendas, imitando falas."]}, {"d": 8, "stage": "Mês 1", "tasks": ["Escolha uma receita no Tasty, leia ingredientes e modo de preparo.", "Assista ao vídeo da receita e pratique a pronúncia."]}, {"d": 9, "stage": "Mês 1", "tasks": ["Escreva sua receita favorita em inglês usando Reverso Context/Collins.", "Faça atividade sobre Food no Wordwall."]}, {"d": 10, "stage": "Mês 1", "tasks": ["Escute a notícia 'People throw away food' (nível 1).", "Leia a notícia e responda no comentário 'What do you think about the news'."]}, {"d": 11, "stage": "Mês 1", "tasks": ["Assista a um tutorial de culinária no YouTube.", "Anote ingredientes de uma receita e poste na Comunidade."]}, {"d": 12, "stage": "Mês 1", "tasks": ["Faça o Quiz sobre comida (filme/snack).", "Analise hábitos alimentares em colunas healthy/un     if (!progress[d]) {
      const day = DAYS[d - 1];
      progress[d] = { a: false, q: false, t: new Array(day.tasks.length).fill(false) };
    }
    return progress[d];
  }

  // ---------- linkify ----------
  const linkKeys = Object.keys(LINKMAP).sort((a, b) => b.length - a.length);
  function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }
  function linkify(text) {
    let html = text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
    const used = new Set();
    for (const key of linkKeys) {
      if (used.has(key.toLowerCase())) continue;
      const url = LINKMAP[key];
      const re = new RegExp("(" + escapeRegExp(key) + ")(?![^<]*>)", "");
      if (re.test(html)) {
        html = html.replace(re, `<a href="${url}" target="_blank" rel="noopener">$1</a>`);
        used.add(key.toLowerCase());
      }
    }
    html = html.replace(/(Comunidade)(?![^<]*>)/, '<b style="color:var(--green); font-weight:600;">$1</b>');
    return html;
  }

  // ---------- per-day / month computation ----------
  function dayTotals(day) {
    return 2 + day.tasks.length;
  }
  function dayDone(day) {
    const st = getDayState(day.d);
    let n = 0;
    if (st.a) n++;
    if (st.q) n++;
    n += st.t.filter(Boolean).length;
    return n;
  }
  function isDayComplete(day) {
    return dayDone(day) === dayTotals(day);
  }

  function stageDays(stageName) {
    return DAYS.filter((d) => d.stage === stageName);
  }
  function stageProgress(stageName) {
    const ds = stageDays(stageName);
    let total = 0, done = 0;
    ds.forEach((d) => { total += dayTotals(d); done += dayDone(d); });
    return { total, done, pct: total ? Math.round((done / total) * 100) : 0 };
  }
  function overallProgress() {
    let total = 0, done = 0, daysDone = 0;
    DAYS.forEach((d) => {
      const t = dayTotals(d), dn = dayDone(d);
      total += t; done += dn;
      if (dn === t) daysDone++;
    });
    return { total, done, daysDone, pct: total ? Math.round((done / total) * 100) : 0 };
  }
  function scoreColor(pct) {
    if (pct < 30) return "var(--score-red)";
    if (pct < 55) return "var(--score-orange)";
    if (pct < 60) return "var(--score-yellow)";
    return "var(--score-green)";
  }
  function firstPendingDay() {
    for (const d of DAYS) {
      if (!isDayComplete(d)) return d.d;
    }
    return null;
  }

  // ---------- render ----------
  function renderTrail() {
    const wrap = document.getElementById("trailNodes");
    wrap.innerHTML = "";
    STAGES_META.forEach((meta) => {
      const { pct } = stageProgress(meta.name);
      const node = document.createElement("div");
      node.className = "trail-node" + (pct === 100 ? " complete" : "");
      node.innerHTML = `
        <div class="trail-dot" style="--p:${pct}; --score-color:${scoreColor(pct)}"></div>
        <div class="trail-label"><b>${meta.name}</b>${pct}%</div>
      `;
      node.addEventListener("click", () => {
        const el = document.getElementById("stage-" + meta.index);
        if (el) { el.open = true; el.scrollIntoView({ behavior: "smooth", block: "start" }); }
      });
      wrap.appendChild(node);
    });
  }

  function renderHeader() {
    const { pct, done, total, daysDone } = overallProgress();
    const ringEl = document.getElementById("ringOuter");
    ringEl.style.setProperty("--pct", pct);
    ringEl.style.setProperty("--score-color", scoreColor(pct));
    document.getElementById("ringPct").textContent = pct + "%";
    document.getElementById("statDaysDone").textContent = daysDone;
    document.getElementById("statItemsDone").textContent = done;
    document.getElementById("statItemsTotal").textContent = total;

    document.getElementById("footBarFill").style.width = pct + "%";
    document.getElementById("footTxt").textContent = pct + "% concluído · " + daysDone + "/360 dias";

    const fp = firstPendingDay();
    const btn = document.getElementById("currentDayBtn");
    if (fp) {
      btn.textContent = "Dia atual → Dia " + fp;
      btn.disabled = false;
    } else {
      btn.textContent = "Trilha completa 🎉";
      btn.disabled = true;
    }
  }

  function renderStages() {
    const container = document.getElementById("stages");
    container.innerHTML = "";
    STAGES_META.forEach((meta) => {
      const ds = stageDays(meta.name);
      const { pct } = stageProgress(meta.name);
      const details = document.createElement("details");
      details.className = "stage";
      details.id = "stage-" + meta.index;
      details.open = meta.defaultOpen || false;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div class="stage-num">${meta.index}</div>
        <div class="stage-info">
          <div class="stage-name">${meta.name}</div>
          <div class="stage-range">dias ${ds[0].d}–${ds[ds.length - 1].d}</div>
        </div>
        <div class="stage-bar-wrap">
          <div class="stage-bar"><i style="width:${pct}%; background:${scoreColor(pct)}"></i></div>
          <div class="stage-pct">${pct}%</div>
        </div>
        <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
      `;
      details.appendChild(summary);

      const body = document.createElement("div");
      body.className = "stage-body";
      ds.forEach((day) => body.appendChild(renderDayCard(day)));
      details.appendChild(body);

      container.appendChild(details);
    });
  }

  function renderDayCard(day) {
    const st = getDayState(day.d);
    const total = dayTotals(day);
    const done = dayDone(day);
    const complete = done === total;
    const card = document.createElement("div");
    card.className = "day" + (complete ? " done" : "");
    card.id = "day-" + day.d;

    const head = document.createElement("div");
    head.className = "day-head";
    head.innerHTML = `
      <span class="day-num">${complete ? "✓ " : ""}Dia ${day.d}</span>
      <div class="day-mini"><i style="width:${Math.round((done / total) * 100)}%"></i></div>
      <button class="day-toggle-all">${complete ? "desmarcar" : "marcar tudo"}</button>
    `;
    head.querySelector(".day-toggle-all").addEventListener("click", () => {
      const target = !complete;
      st.a = target; st.q = target;
      st.t = st.t.map(() => target);
      scheduleSave();
      refreshDay(day.d);
      renderHeader();
      renderTrail();
    });
    card.appendChild(head);

    card.appendChild(taskRow(`Assista à aula ${day.d}.`, st.a, (v) => { st.a = v; }, day.d));
    card.appendChild(taskRow(`Faça o Quiz ${day.d}.`, st.q, (v) => { st.q = v; }, day.d));

    if (day.tasks.length === 0) {
      const e = document.createElement("div");
      e.className = "empty-tasks";
      e.textContent = "Sem atividades extras hoje — só aula e quiz.";
      card.appendChild(e);
    } else {
      day.tasks.forEach((txt, i) => {
        card.appendChild(taskRow(txt, st.t[i], (v) => { st.t[i] = v; }, day.d));
      });
    }

    const qa = LESSONS[String(day.d)];
    if (qa && qa.length) {
      card.appendChild(renderLessonBlock(day.d, qa));
    }

    return card;
  }

  function renderLessonBlock(dayNum, qa) {
    const details = document.createElement("details");
    details.className = "lesson-block";
    const summary = document.createElement("summary");
    summary.textContent = `Conteúdo da aula ${dayNum} (${qa.length} perguntas)`;
    details.appendChild(summary);

    const list = document.createElement("div");
    list.className = "lesson-qa";
    qa.forEach(([q, a]) => {
      const item = document.createElement("div");
      item.className = "lesson-qa-item";
      item.innerHTML = `<span class="lesson-q">Q: ${q}</span><span class="lesson-a">A: ${a}</span>`;
      list.appendChild(item);
    });
    details.appendChild(list);
    return details;
  }

  function taskRow(text, checked, onChange, dayNum) {
    const row = document.createElement("label");
    row.className = "task" + (checked ? " checked" : "");
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = checked;
    cb.addEventListener("change", () => {
      onChange(cb.checked);
      row.classList.toggle("checked", cb.checked);
      scheduleSave();
      renderHeader();
      renderTrail();
      updateDayVisual(dayNum);
    });
    const span = document.createElement("span");
    span.innerHTML = linkify(text);
    row.appendChild(cb);
    row.appendChild(span);
    return row;
  }

  function updateDayVisual(dayNum) {
    const day = DAYS[dayNum - 1];
    const card = document.getElementById("day-" + dayNum);
    if (!card) return;
    const total = dayTotals(day);
    const done = dayDone(day);
    const complete = done === total;
    card.classList.toggle("done", complete);
    card.querySelector(".day-mini > i").style.width = Math.round((done / total) * 100) + "%";
    const numEl = card.querySelector(".day-num");
    if (numEl) numEl.textContent = (complete ? "✓ " : "") + "Dia " + dayNum;
    const btn = card.querySelector(".day-toggle-all");
    if (btn) btn.textContent = complete ? "desmarcar" : "marcar tudo";
  }

  function refreshDay(dayNum) {
    const day = DAYS[dayNum - 1];
    const old = document.getElementById("day-" + dayNum);
    if (!old) return;
    const fresh = renderDayCard(day);
    old.replaceWith(fresh);
  }

  function jumpToDay(n) {
    n = parseInt(n, 10);
    if (!n || n < 1 || n > 360) return;
    const day = DAYS[n - 1];
    const stIdx = STAGES_META.find((m) => m.name === day.stage).index;
    const stageEl = document.getElementById("stage-" + stIdx);
    if (stageEl) stageEl.open = true;
    requestAnimationFrame(() => {
      const el = document.getElementById("day-" + n);
      if (el) {
        el.scrollIntoView({ behavior: "smooth", block: "center" });
        el.classList.add("flash");
        setTimeout(() => el.classList.remove("flash"), 1000);
      }
    });
  }

  // ---------- init ----------
  async function init() {
    await loadProgress();

    const fp = firstPendingDay();
    if (fp) {
      const st = DAYS[fp - 1].stage;
      STAGES_META.forEach((m) => (m.defaultOpen = m.name === st));
    } else {
      STAGES_META[0].defaultOpen = true;
    }

    renderHeader();
    renderTrail();
    renderStages();

    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("currentDayBtn").addEventListener("click", () => {
      const target = firstPendingDay();
      if (target) jumpToDay(target);
      else showStatus("tudo concluído! 🎉");
    });

    if (fp) setTimeout(() => jumpToDay(fp), 400);
  }

  init();
})();

</script>
</body>
